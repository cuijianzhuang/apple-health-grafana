<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Soul, Your Beats — 心率</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #080b10;
            --surface: rgba(255,255,255,0.03);
            --panel: rgba(14,18,26,0.9);
            --border: rgba(255,255,255,0.07);
            --text: #f0f2f5;
            --muted: #4a5568;
            --muted2: #718096;
            --red: #ff3d5a;
            --red-glow: rgba(255,61,90,0.35);
            --red-dim: rgba(255,61,90,0.12);
            --pink: #ff8fa3;
            --blue: #378ADD;
            --pulse-ms: 800ms;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: "Syne", sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            pointer-events: none; z-index: 0; opacity: 0.6;
        }

        .ambient { position: fixed; pointer-events: none; z-index: 0; border-radius: 50%; }
        .ambient-1 { width:600px;height:600px;top:-180px;left:-120px;background:radial-gradient(circle,rgba(255,61,90,0.07) 0%,transparent 70%); }
        .ambient-2 { width:450px;height:450px;bottom:-80px;right:-80px;background:radial-gradient(circle,rgba(80,30,180,0.05) 0%,transparent 70%); }

        .wrap { position:relative;z-index:1;max-width:920px;margin:0 auto;padding:2.5rem 1.5rem 4rem; }

        /* ── Header ── */
        header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 2rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .brand-tag {
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--red);
            margin-bottom: .5rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .brand-tag::before { content:"";width:16px;height:2px;background:var(--red);display:inline-block; }

        header h1 { font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;letter-spacing:-.04em;line-height:1; }
        header h1 span { color:var(--red); }

        .header-sub { margin-top:.5rem;font-size:.75rem;color:var(--muted2);font-family:"JetBrains Mono",monospace;font-weight:300; }
        .header-sub a { color:var(--red);text-decoration:none; }
        .header-sub a:hover { text-decoration:underline; }

        /* ── Toolbar ── */
        .toolbar { display:flex;align-items:center;justify-content:flex-end; }

        button {
            font-family: "Syne", sans-serif;
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            padding: .52rem 1.15rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted2);
            cursor: pointer;
            transition: all .18s;
        }
        button:hover { color:var(--text);border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.05); }
        button.primary { background:var(--red);border-color:var(--red);color:#fff; }
        button.primary:hover { background:#ff5570; }

        /* ── Hero Panel ── */
        .hero-panel {
            position: relative;
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 1rem;
            height: 260px;
            background:
                    radial-gradient(ellipse 55% 120% at 18% 50%, rgba(255,61,90,0.13) 0%, transparent 60%),
                    rgba(14,18,26,0.92);
        }
        .hero-panel::before {
            content:""; position:absolute; top:0; left:0; right:0; height:1px;
            background:linear-gradient(90deg,transparent,rgba(255,61,90,.55) 35%,rgba(255,143,163,.4) 55%,transparent);
        }

        #ecg-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .hero-left {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            background: linear-gradient(90deg, rgba(14,18,26,0.88) 55%, transparent 100%);
        }

        #heart-svg-el {
            width: 120px;
            height: 110px;
            filter: drop-shadow(0 0 20px rgba(255,61,90,.45));
            transition: filter .08s;
            flex-shrink: 0;
        }

        .bpm-block { margin-top: -8px; text-align: center; }

        .bpm-big {
            font-family: "JetBrains Mono", monospace;
            font-size: clamp(3.2rem, 7vw, 4.5rem);
            font-weight: 600;
            line-height: 1;
            letter-spacing: -.04em;
            color: var(--text);
        }

        .bpm-meta { display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.4rem; }
        .bpm-pill { font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--red);background:var(--red-dim);border:1px solid rgba(255,61,90,.22);padding:.2rem .5rem;border-radius:4px; }
        .pulse-dot {
            width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;
            box-shadow:0 0 0 0 var(--red-glow);
            transition: box-shadow .12s ease-out, opacity .12s ease-out;
        }

        .latest-time { margin-top:.45rem;font-family:"JetBrains Mono",monospace;font-size:.68rem;font-weight:300;color:var(--muted); }

        .ecg-label {
            position: absolute;
            top: 1rem; right: 1.25rem;
            font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
            z-index: 2;
        }

        /* Pause overlay state */
        .pause-hint { display: none; }

        /* ── Stats ── */
        .stats-row { display:grid;grid-template-columns:repeat(3,1fr);gap:1px;border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:1rem;background:var(--border); }
        .stat-cell { padding:1rem 1.25rem;background:var(--bg);transition:background .2s; }
        .stat-cell:hover { background:rgba(255,255,255,.02); }
        .stat-label { font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem; }
        .stat-value { font-family:"JetBrains Mono",monospace;font-size:1.6rem;font-weight:600;color:var(--text);letter-spacing:-.03em;transition:color .4s; }
        .stat-value.red { color:var(--red); }
        .stat-value.blue { color:var(--blue); }
        .stat-unit { font-size:.58rem;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-left:.2rem; }

        /* ── Table ── */
        .section-label { font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;gap:.6rem; }
        .section-label::after { content:"";flex:1;height:1px;background:var(--border); }

        .table-card { border:1px solid var(--border);border-radius:14px;overflow:hidden; }
        table { width:100%;border-collapse:collapse; }
        thead tr { border-bottom:1px solid var(--border); }
        th { padding:.7rem 1.25rem;text-align:left;font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.02); }
        td { padding:.7rem 1.25rem;font-family:"JetBrains Mono",monospace;font-size:.8rem;font-weight:300;color:var(--muted2);border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(255,255,255,.02); }
        td:last-child { text-align:right; }

        .bpm-row-val { display:inline-flex;align-items:center;gap:.4rem;font-weight:600;color:var(--text); }
        .bpm-row-dot { width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0; }
        .bpm-high .bpm-row-dot { background:#ff6b35; }
        .bpm-low  .bpm-row-dot { background:#4ecdc4; }

        @keyframes rowIn { from{opacity:0;background:rgba(255,61,90,.07)} to{opacity:1;background:transparent} }
        .row-new td { animation:rowIn .6s ease forwards; }

        /* ── Carousel ── */
        .bpm-big, .latest-time { transition: opacity .2s ease; }

        /* Active table row highlight */
        tr.row-active td { background: rgba(255,61,90,0.06) !important; color: var(--text); }
        tr.row-active .bpm-row-val { color: var(--red); }
        tbody tr { cursor: pointer; }

        .err { color:#fc8181;text-align:center;padding:1rem 1.25rem;font-size:.8rem;font-family:"JetBrains Mono",monospace;font-weight:300; }

        .footnote { margin-top:2.5rem;text-align:center;font-size:.7rem;color:var(--muted);font-family:"JetBrains Mono",monospace;font-weight:300;line-height:1.8; }
        .footnote code { color:var(--red); }

        @media (max-width: 700px) {
            .hero-panel { height: 210px; }
            .hero-left { width: 190px; }
            #heart-svg-el { width: 85px; height: 78px; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .stat-cell:last-child { grid-column: 1 / -1; }
            header { flex-direction: column; }
            .toolbar { justify-content: flex-start; }
        }
    </style>
</head>
<body>
<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>
<div class="wrap">

    <header>
        <div>
            <div class="brand-tag">Heart Monitor</div>
            <h1>Your Soul,<br><span>Your Beats</span></h1>
            <p class="header-sub">via <a href="https://github.com/yihong0618/iBeats" target="_blank" rel="noopener">iBeats</a> — Apple Watch / Health Auto Export</p>
        </div>
        <div class="toolbar">
            <button type="button" id="btn-refresh" class="primary">从服务器读取</button>
        </div>
    </header>

    <div class="hero-panel">
        <canvas id="ecg-canvas"></canvas>
        <div class="ecg-label" id="ecg-label">心率趋势</div>
        <div class="hero-left">
            <svg id="heart-svg-el" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="hg" cx="35%" cy="28%" r="72%">
                        <stop offset="0%"   stop-color="#ffb3c1"/>
                        <stop offset="40%"  stop-color="#ff3d5a"/>
                        <stop offset="100%" stop-color="#9b0d26"/>
                    </radialGradient>
                    <radialGradient id="hglow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%"   stop-color="rgba(255,61,90,0.28)"/>
                        <stop offset="100%" stop-color="rgba(255,61,90,0)"/>
                    </radialGradient>
                </defs>
                <ellipse id="halo" cx="50" cy="48" rx="44" ry="40" fill="url(#hglow)" opacity="0.45"/>
                <path id="heart-path"
                      d="M50,76 C50,76 10,52 10,28 C10,16 19,8 30,8 C38,8 45,13 50,20 C55,13 62,8 70,8 C81,8 90,16 90,28 C90,52 50,76 50,76 Z"
                      fill="url(#hg)"
                      stroke="rgba(255,140,160,0.35)" stroke-width="1"/>
                <path d="M29,24 C34,15 45,13 50,21" fill="none"
                      stroke="rgba(255,235,240,0.5)" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M50,72 C35,60 18,48 14,34" fill="none"
                      stroke="rgba(100,0,20,0.25)" stroke-width="4" stroke-linecap="round"/>
            </svg>
            <div class="bpm-block">
                <div class="bpm-big" id="big-bpm">—</div>
                <div class="bpm-meta">
                    <span class="pulse-dot"></span>
                    <span class="bpm-pill">BPM</span>
                </div>
                <div class="latest-time" id="latest-time">尚未加载</div>
            </div>
        </div>
        <div class="pause-hint">已暂停 · 移开恢复</div>
    </div>

    <div class="stats-row">
        <div class="stat-cell">
            <div class="stat-label">最低心率</div>
            <div class="stat-value blue" id="stat-min">—<span class="stat-unit">bpm</span></div>
        </div>
        <div class="stat-cell">
            <div class="stat-label">平均心率</div>
            <div class="stat-value" id="stat-avg">—<span class="stat-unit">bpm</span></div>
        </div>
        <div class="stat-cell">
            <div class="stat-label">最高心率</div>
            <div class="stat-value red" id="stat-max">—<span class="stat-unit">bpm</span></div>
        </div>
    </div>

    <div class="section-label">历史记录</div>
    <div class="table-card">
        <table>
            <thead><tr><th>时间</th><th style="text-align:right;">心率 (BPM)</th></tr></thead>
            <tbody id="rows"></tbody>
        </table>
        <div class="err" id="err" hidden></div>
    </div>

    <p class="footnote">访问 <code>/heartbeat/</code> 与 <code>/api/heartbeat/recent</code> 读取 InfluxDB 中的 HeartRate 测量数据</p>
</div>

<script>
    (function () {
        'use strict';

        /* ═══════════════════════════════════════════════════════════
           Heart-Rate Monitor • beat-driven ECG
           ─────────────────────────────────────────────────────────── */

        const RECENT_COUNT     = 10;
        const BPM_LERP_RATE    = 0.08;   // smoothing for currentBpm transitions
        const HEART_DOM_THRESH = 0.005;  // skip DOM write if scale change < this
        const ECG_BEATS_VIS    = 8;      // beats visible across ECG strip
        const ECG_RESOLUTION   = 80;     // sub-steps per beat for waveform

        /* ── DOM cache ── */
        const $ = id => document.getElementById(id);
        const dom = {
            panel:        document.querySelector('.hero-panel'),
            canvas:       $('ecg-canvas'),
            bigBpm:       $('big-bpm'),
            latestTime:   $('latest-time'),
            ecgLabel:     $('ecg-label'),
            pulseDot:     document.querySelector('.pulse-dot'),
            heartPath:    $('heart-path'),
            heartHalo:    $('halo'),
            heartSvg:     $('heart-svg-el'),
            btnRefresh:   $('btn-refresh'),
            err:          $('err'),
            rows:         $('rows'),
            statMin:      $('stat-min'),
            statAvg:      $('stat-avg'),
            statMax:      $('stat-max'),
        };
        const ctx = dom.canvas.getContext('2d');

        /* ── state ── */
        let allReadings   = [];
        let allBpms       = [];
        let selectedIndex = 0;
        let currentBpm    = 72;        // smoothed value used for animations
        let targetBpm     = 72;        // current record's true BPM
        let displayedBpm  = null;      // BPM number shown
        let latestTimeIso = null;
        let pageVisible   = true;
        let autoRefreshTimer     = null;
        let relativeTimeInterval = null;

        /* ── canvas + offscreen strip ── */
        let ecgBuf = null, ecgBufCtx = null;
        let ecgW = 0, ecgH = 0, ecgX0 = 0;

        /* Beat tracking (rAF-driven) */
        let beatPhase    = 0;          // 0..1 within current beat
        let lastFrameNow = null;
        let drawnSteps   = 0;          // last step index drawn into current slot
        let prevPathPt   = null;       // {x,y} last segment endpoint for incremental draw

        /* Heart cache to skip DOM writes */
        let heartScale = 1, lastHeartScale = -1;

        /* ── Init canvas (1:1 CSS pixels — keeps math simple, looks fine on retina at this size) ── */
        function initCanvas() {
            const panel = dom.canvas.parentElement;
            const cssW = Math.max(panel.offsetWidth, 100);
            const cssH = Math.max(panel.offsetHeight, 100);

            dom.canvas.width  = cssW;
            dom.canvas.height = cssH;

            const leftW = Math.round(cssW * 0.325);
            ecgX0 = leftW;
            ecgW  = cssW - leftW;
            ecgH  = cssH;

            // Offscreen strip — same dims as ECG zone
            try {
                ecgBuf    = new OffscreenCanvas(ecgW, ecgH);
                ecgBufCtx = ecgBuf.getContext('2d');
            } catch (_) {
                ecgBuf = document.createElement('canvas');
                ecgBuf.width = ecgW; ecgBuf.height = ecgH;
                ecgBufCtx = ecgBuf.getContext('2d');
            }
            ecgBufCtx.clearRect(0, 0, ecgW, ecgH);
            paintGridFull();
            drawnSteps = 0;
            prevPathPt = null;
        }

        function paintGridFull() {
            const c = ecgBufCtx;
            c.save();
            c.strokeStyle = 'rgba(255,80,110,0.07)';
            c.lineWidth = 0.5;
            c.setLineDash([3, 5]);
            const cols = ECG_BEATS_VIS, rows = 4;
            for (let i = 0; i <= cols; i++) {
                const x = (i / cols) * ecgW;
                c.beginPath(); c.moveTo(x, 0); c.lineTo(x, ecgH); c.stroke();
            }
            for (let i = 1; i < rows; i++) {
                const y = (i / rows) * ecgH;
                c.beginPath(); c.moveTo(0, y); c.lineTo(ecgW, y); c.stroke();
            }
            c.setLineDash([]);
            c.restore();
        }

        function paintGridSlot(slotX, complexW) {
            const c = ecgBufCtx;
            c.save();
            c.strokeStyle = 'rgba(255,80,110,0.07)';
            c.lineWidth = 0.5;
            c.setLineDash([3, 5]);
            // Vertical grid line at slot start
            c.beginPath(); c.moveTo(slotX, 0); c.lineTo(slotX, ecgH); c.stroke();
            c.beginPath(); c.moveTo(slotX + complexW, 0); c.lineTo(slotX + complexW, ecgH); c.stroke();
            // Horizontal lines clipped to slot
            for (let i = 1; i < 4; i++) {
                const y = (i / 4) * ecgH;
                c.beginPath(); c.moveTo(slotX, y); c.lineTo(slotX + complexW, y); c.stroke();
            }
            c.setLineDash([]);
            c.restore();
        }

        /* ── PQRST waveform shape (knot interpolation) ── */
        function pqrstKnots(amp) {
            const a = Math.max(0.15, Math.min(1, amp));
            return [
                [0.00,  0.00], [0.10,  0.00],
                [0.16,  0.10 * a], [0.22,  0.00],
                [0.28, -0.12 * a], [0.35,  1.00 * a],   // QRS spike
                [0.42, -0.18 * a], [0.50,  0.00],
                [0.60,  0.00], [0.70,  0.30 * a],       // T wave
                [0.82,  0.00], [1.00,  0.00],
            ];
        }
        function evalKnots(knots, t) {
            for (let i = 1; i < knots.length; i++) {
                if (t <= knots[i][0]) {
                    const [t0, y0] = knots[i - 1];
                    const [t1, y1] = knots[i];
                    const f = t1 === t0 ? 0 : (t - t0) / (t1 - t0);
                    return y0 + (y1 - y0) * f;
                }
            }
            return 0;
        }
        function bpmToAmp(bpm) {
            return Math.max(0.15, Math.min(1.0, (bpm - 40) / 110));
        }

        /* ── Shift the strip left by complexW pixels (called once per beat) ──
           Drawing a canvas onto itself is unreliable; copy via temp canvas. */
        let shiftScratch = null;
        function shiftStrip(complexW) {
            const shift = Math.round(complexW);
            if (!shiftScratch || shiftScratch.width !== ecgW || shiftScratch.height !== ecgH) {
                shiftScratch = document.createElement('canvas');
                shiftScratch.width  = ecgW;
                shiftScratch.height = ecgH;
            }
            const sctx = shiftScratch.getContext('2d');
            sctx.clearRect(0, 0, ecgW, ecgH);
            sctx.drawImage(ecgBuf, 0, 0);

            ecgBufCtx.clearRect(0, 0, ecgW, ecgH);
            ecgBufCtx.drawImage(shiftScratch, -shift, 0);

            // Paint fresh grid in the new rightmost slot
            const slotX = ecgW - complexW;
            ecgBufCtx.clearRect(slotX, 0, complexW + 1, ecgH);
            paintGridSlot(slotX, complexW);
        }

        /* ── Incremental ECG draw: only the newly-revealed segment ── */
        function drawEcgSegment(bpm, beatBpmCached, progress, isReset) {
            const beatsVisible = ECG_BEATS_VIS;
            const complexW     = ecgW / beatsVisible;
            const slotX        = ecgW - complexW;
            const baseline     = ecgH * 0.62;
            const maxAmp       = ecgH * 0.40;
            const knots        = pqrstKnots(bpmToAmp(beatBpmCached));
            const targetSteps  = Math.floor(progress * ECG_RESOLUTION);

            if (isReset) {
                drawnSteps = 0;
                prevPathPt = {
                    x: slotX,
                    y: baseline - evalKnots(knots, 0) * maxAmp,
                };
            }

            if (targetSteps <= drawnSteps) return;

            const c = ecgBufCtx;
            // Stroke the new segment from drawnSteps → targetSteps
            c.save();
            c.strokeStyle = '#ff3d5a';
            c.lineWidth = 2;
            c.lineJoin = 'round'; c.lineCap = 'round';
            c.shadowColor = '#ff3d5a'; c.shadowBlur = 9;
            c.beginPath();
            c.moveTo(prevPathPt.x, prevPathPt.y);
            let lastPt = prevPathPt;
            for (let s = drawnSteps + 1; s <= targetSteps; s++) {
                const t = s / ECG_RESOLUTION;
                const x = slotX + t * complexW;
                const y = baseline - evalKnots(knots, t) * maxAmp;
                c.lineTo(x, y);
                lastPt = { x, y };
            }
            c.stroke();
            c.shadowBlur = 0;
            c.restore();

            drawnSteps = targetSteps;
            prevPathPt = lastPt;
        }

        /* ── Composite frame onto main canvas ── */
        function compositeFrame(progress, beatBpmCached) {
            ctx.clearRect(0, 0, dom.canvas.width, dom.canvas.height);
            if (!ecgBuf) return;

            const complexW = ecgW / ECG_BEATS_VIS;

            // Blit buffer at ecgX0 (1:1 — no scaling)
            ctx.drawImage(ecgBuf, ecgX0, 0);

            // Soft red area-fill under the visible waveform area (cheap full-strip overlay)
            // — kept lightweight, applied only over the strip
            const baseline = ecgH * 0.62;
            const areaH    = ecgH * 0.40;
            const areaGrad = ctx.createLinearGradient(0, baseline - areaH, 0, baseline);
            areaGrad.addColorStop(0, 'rgba(255,61,90,0.04)');
            areaGrad.addColorStop(1, 'rgba(255,61,90,0)');
            ctx.fillStyle = areaGrad;
            ctx.fillRect(ecgX0, baseline - areaH, ecgW, areaH);

            // Left fade mask
            const fadeW = 48;
            const mask  = ctx.createLinearGradient(ecgX0, 0, ecgX0 + fadeW, 0);
            mask.addColorStop(0, 'rgba(14,18,26,1)');
            mask.addColorStop(1, 'rgba(14,18,26,0)');
            ctx.fillStyle = mask;
            ctx.fillRect(ecgX0, 0, fadeW + 2, ecgH);

            // Sweep glow + cursor dot at leading edge
            const cursorX = ecgX0 + ecgW - complexW * (1 - progress);
            const sweep   = ctx.createLinearGradient(cursorX - 24, 0, cursorX + 8, 0);
            sweep.addColorStop(0,   'rgba(255,61,90,0)');
            sweep.addColorStop(0.6, 'rgba(255,90,120,0.16)');
            sweep.addColorStop(1,   'rgba(255,200,220,0.5)');
            ctx.fillStyle = sweep;
            ctx.fillRect(cursorX - 24, 0, 32, ecgH);

            // Cursor dot — draw on main canvas so it doesn't smear into buffer
            if (prevPathPt) {
                const dotX = ecgX0 + prevPathPt.x;
                const dotY = prevPathPt.y;
                ctx.save();
                ctx.beginPath();
                ctx.arc(dotX, dotY, 4.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,61,90,0.22)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(dotX, dotY, 2.6, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();

                // BPM label above current beat's R-peak (only after we've drawn past R)
                if (progress > 0.36) {
                    const rPeakY = ecgH * 0.62 - bpmToAmp(beatBpmCached) * ecgH * 0.40;
                    const rPeakX = ecgX0 + (ecgW - complexW) + 0.35 * complexW;
                    ctx.save();
                    ctx.font = '600 11px "JetBrains Mono", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.shadowColor = 'rgba(255,61,90,0.6)';
                    ctx.shadowBlur = 6;
                    ctx.fillText(String(Math.round(beatBpmCached)), rPeakX, rPeakY - 10);
                    ctx.restore();
                }
            }
        }

        /* ── Heart animation — phase-driven, DOM-throttled ── */
        function updateHeart() {
            const p = beatPhase;
            let next;
            if (p < 0.12)      next = 1 + (p / 0.12) * 0.13;
            else if (p < 0.38) next = 1.13 - ((p - 0.12) / 0.26) * 0.13;
            else               next = 1;
            heartScale = next;

            // Skip DOM write if change is imperceptible
            if (Math.abs(heartScale - lastHeartScale) < HEART_DOM_THRESH) return;
            lastHeartScale = heartScale;

            const cx = 50, cy = 48;
            const tf = `translate(${cx},${cy}) scale(${heartScale.toFixed(3)}) translate(${-cx},${-cy})`;
            dom.heartPath.setAttribute('transform', tf);
            dom.heartHalo.setAttribute('transform', tf);
            dom.heartHalo.setAttribute('opacity', (0.3 + (heartScale - 1) * 4).toFixed(3));
            dom.heartSvg.style.filter =
                `drop-shadow(0 0 ${Math.round((heartScale - 1) * 180)}px rgba(255,61,90,0.7))`;

            // Sync the small pulse dot in BPM block
            if (dom.pulseDot) {
                const intensity = Math.max(0, (heartScale - 1) / 0.13);
                const ring = Math.round(intensity * 9);
                dom.pulseDot.style.boxShadow = ring > 0
                    ? `0 0 0 ${ring}px rgba(255,61,90,${0.35 * (1 - intensity * 0.7)})`
                    : '0 0 0 0 rgba(255,61,90,0)';
                dom.pulseDot.style.opacity = String(0.55 + intensity * 0.45);
            }
        }

        /* ── BPM number rolling animation ── */
        function animateBpm(target) {
            const node = dom.bigBpm;
            if (target == null || isNaN(target)) {
                displayedBpm = null;
                node.textContent = '—';
                return;
            }
            const goal  = Math.round(target);
            const start = displayedBpm == null ? goal : displayedBpm;
            if (goal === start) { node.textContent = String(goal); displayedBpm = goal; return; }
            const dur = 500, t0 = performance.now();
            function step(ts) {
                const p = Math.min((ts - t0) / dur, 1);
                const e = 1 - Math.pow(1 - p, 3);
                node.textContent = String(Math.round(start + (goal - start) * e));
                if (p < 1) requestAnimationFrame(step);
                else displayedBpm = goal;
            }
            requestAnimationFrame(step);
        }

        /* ── Select record idx ── */
        let rowEls = [];

        function showSelectedItem(idx) {
            if (!allReadings.length) return;
            const len = allReadings.length;
            idx = ((idx % len) + len) % len;
            selectedIndex = idx;
            const r   = allReadings[idx];
            const bpm = Number(r.bpm) || 72;
            targetBpm     = bpm;
            latestTimeIso = r.time;
            animateBpm(bpm);
            dom.latestTime.textContent = fmtRelativeTime(latestTimeIso);

            // Use cached element arrays (no querySelectorAll per call)
            for (let i = 0; i < rowEls.length; i++) {
                rowEls[i].classList.toggle('row-active', i === idx);
            }
            const active = rowEls[idx];
            if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }

        function jumpTo(idx) {
            const r = allReadings[idx];
            if (!r) return;
            const newBpm = Number(r.bpm) || 72;
            // Snap state — the next loop iteration will open a fresh slot for this record
            beatPhase     = 0;
            prevPathPt    = null;
            drawnSteps    = 0;
            currentBpm    = newBpm;
            targetBpm     = newBpm;
            beatBpmLocked = newBpm;
            showSelectedItem(idx);
        }

        /* ── Helpers ── */
        function fmtTime(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            if (isNaN(d)) return iso;
            return d.toLocaleString('zh-CN', {
                year:'numeric', month:'2-digit', day:'2-digit',
                hour:'2-digit', minute:'2-digit', second:'2-digit',
            });
        }
        function fmtRelativeTime(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            if (isNaN(d)) return fmtTime(iso);
            const mins = Math.floor((Date.now() - d) / 60000);
            if (mins < 1)  return '刚刚';
            if (mins < 60) return `${mins} 分钟前`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24)  return `${hrs} 小时前`;
            return fmtTime(iso);
        }
        function bpmCat(bpm) {
            if (bpm >= 100) return 'bpm-high';
            if (bpm <= 60)  return 'bpm-low';
            return '';
        }
        function updateStats() {
            if (!allBpms.length) return;
            const mn = Math.min(...allBpms), mx = Math.max(...allBpms);
            const av = Math.round(allBpms.reduce((a, b) => a + b, 0) / allBpms.length);
            dom.statMin.innerHTML = `${mn}<span class="stat-unit">bpm</span>`;
            dom.statAvg.innerHTML = `${av}<span class="stat-unit">bpm</span>`;
            dom.statMax.innerHTML = `${mx}<span class="stat-unit">bpm</span>`;
        }
        function resetStats() {
            [dom.statMin, dom.statAvg, dom.statMax].forEach(el => {
                el.innerHTML = `—<span class="stat-unit">bpm</span>`;
            });
        }
        function pickRecentReadings(readings) {
            return [...readings]
                .filter(r => !isNaN(new Date(r.time).getTime()))
                .sort((a, b) => new Date(b.time) - new Date(a.time))
                .slice(0, RECENT_COUNT);
        }

        /* ── Render fresh data ── */
        function render(readings) {
            dom.err.hidden = true;
            clearInterval(autoRefreshTimer);
            clearInterval(relativeTimeInterval);
            dom.rows.innerHTML = '';
            rowEls = [];

            const recent = readings.length ? pickRecentReadings(readings) : [];

            if (!recent.length) {
                animateBpm(null);
                dom.latestTime.textContent = '暂无心率记录';
                dom.ecgLabel.textContent = '心率趋势';
                allReadings = []; allBpms = [];
                resetStats();
                if (readings.length) autoRefreshTimer = setInterval(() => fetchRecent(true), 30000);
                return;
            }

            allReadings = recent;
            allBpms     = allReadings.map(r => Number(r.bpm)).filter(v => !isNaN(v));
            updateStats();
            dom.ecgLabel.textContent = `最近 ${allReadings.length} 条`;

            // Build table rows
            const rowsFrag = document.createDocumentFragment();
            allReadings.forEach((r, i) => {
                const bVal = r.bpm != null ? Math.round(r.bpm) : null;
                const tr   = document.createElement('tr');
                if (i === 0) tr.classList.add('row-active');
                tr.innerHTML = `<td>${fmtTime(r.time)}</td><td><span class="bpm-row-val ${bpmCat(bVal)}"><span class="bpm-row-dot"></span>${bVal ?? '—'}</span></td>`;
                tr.addEventListener('click', () => { jumpTo(i); });
                rowsFrag.appendChild(tr);
                rowEls.push(tr);
            });
            dom.rows.appendChild(rowsFrag);

            selectedIndex = 0;
            currentBpm = targetBpm = Number(allReadings[0].bpm) || 72;
            showSelectedItem(0);

            // Refresh relative-time text every minute
            relativeTimeInterval = setInterval(() => {
                dom.latestTime.textContent = fmtRelativeTime(latestTimeIso);
            }, 60000);

            autoRefreshTimer = setInterval(() => fetchRecent(true), 30000);
        }

        function showError(msg) {
            dom.err.textContent = msg;
            dom.err.hidden = !msg;
        }

        async function fetchRecent(silent = false) {
            const btn = dom.btnRefresh;
            if (!silent) { btn.disabled = true; btn.textContent = '加载中…'; }
            try {
                const res  = await fetch('/api/heartbeat/recent?limit=10');
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    showError(data.error || data.detail || '请求失败 ' + res.status);
                    return;
                }
                render(data.readings || []);
            } catch (_) {
                showError('无法连接 API。');
            } finally {
                if (!silent) { btn.disabled = false; btn.textContent = '从服务器读取'; }
            }
        }

        /* ═══════════════════════════════════════════════════════════
           Main rAF loop
           ─────────────────────────────────────────────────────────── */
        let beatBpmLocked = 72;  // BPM used for the in-progress beat (locked at beat start)

        function loop(now) {
            requestAnimationFrame(loop);
            if (!pageVisible) { lastFrameNow = null; return; }
            const firstFrame = lastFrameNow === null;
            if (firstFrame) { lastFrameNow = now; }
            const dt = now - lastFrameNow;
            lastFrameNow = now;

            if (!allReadings.length) return;

            // Smooth currentBpm toward targetBpm (used only between beats — gets snapped at beat start)
            const lerpAmt = 1 - Math.pow(1 - BPM_LERP_RATE, dt / 16.67);
            currentBpm += (targetBpm - currentBpm) * lerpAmt;

            const beatMs = 60000 / Math.max(1, beatBpmLocked || currentBpm);
            beatPhase += dt / beatMs;

            // First frame: open the first slot for the currently-displayed record
            if (firstFrame || prevPathPt === null) {
                beatBpmLocked = Number(allReadings[selectedIndex].bpm) || currentBpm;
                targetBpm     = beatBpmLocked;
                currentBpm    = beatBpmLocked;
                const complexW = ecgW / ECG_BEATS_VIS;
                shiftStrip(complexW);
                beatPhase = 0;
                drawEcgSegment(beatBpmLocked, beatBpmLocked, beatPhase, true);
                compositeFrame(beatPhase, beatBpmLocked);
                updateHeart();
                return;
            }

            if (beatPhase >= 1) {
                // ─── Beat complete ───
                // 1. Draw the final segment to fill the slot completely
                drawEcgSegment(beatBpmLocked, beatBpmLocked, 1, false);
                compositeFrame(1, beatBpmLocked);

                // 2. Carry overshoot phase
                beatPhase = Math.max(0, beatPhase - 1);
                // 3. Keep using selected record BPM for continuous line
                beatBpmLocked = Number(allReadings[selectedIndex].bpm) || 72;
                targetBpm     = beatBpmLocked;
                currentBpm    = beatBpmLocked;

                // 4. Shift strip and start a fresh slot for this record
                const complexW = ecgW / ECG_BEATS_VIS;
                shiftStrip(complexW);
                drawEcgSegment(beatBpmLocked, beatBpmLocked, beatPhase, true);
                compositeFrame(beatPhase, beatBpmLocked);
            } else {
                drawEcgSegment(beatBpmLocked, beatBpmLocked, beatPhase, false);
                compositeFrame(beatPhase, beatBpmLocked);
            }

            updateHeart();
        }

        /* ═══════════════════════════════════════════════════════════
           Event wiring
           ─────────────────────────────────────────────────────────── */

        document.addEventListener('visibilitychange', () => {
            pageVisible = !document.hidden;
            if (pageVisible) {
                lastFrameNow = null;
                lastHeartScale = -1;
            }
        });

        dom.btnRefresh.addEventListener('click', () => fetchRecent(false));

        // Resize: re-init canvas (debounced via rAF)
        let resizeRaf = null;
        window.addEventListener('resize', () => {
            if (resizeRaf) cancelAnimationFrame(resizeRaf);
            resizeRaf = requestAnimationFrame(() => {
                initCanvas();
                resizeRaf = null;
            });
        });

        /* ── Bootstrap ── */
        initCanvas();
        requestAnimationFrame(loop);
        fetchRecent(false);
    })();
</script>
</body>
</html>
