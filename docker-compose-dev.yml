services:
  grafana:
    build: ./grafana
    environment:
      - GF_USERS_DEFAULT_LANGUAGE=zh-Hans
    ports:
    - 3000:3000
  influx:
    image: influxdb:1.8
    environment:
      - INFLUXDB_DB=health
    volumes:
    - influx-data:/var/lib/influxdb
  # 挂载整个 tests 目录，避免 Windows 上「文件不存在时被建成空目录」导致
  # 目录绑定到容器内 /export.zip 文件路径而报错。
  ingester:
    build: ./ingester
    environment:
      - ZIP_PATH=/import/test-export.zip
    volumes:
      - ./tests:/import:ro

  api:
    build: ./ingester
    command: ["api.py"]
    ports:
    - 5353:5353
    environment:
      - INFLUX_HOST=influx
      - INFLUX_DB=health
      - API_PORT=5353

volumes:
  influx-data: