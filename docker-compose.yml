services:
  grafana:
    build: ./grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-health}
      - GF_USERS_DEFAULT_LANGUAGE=zh-Hans
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      # 持久化用户/组织设置、非 provisioning 面板、告警等（默认 SQLite：/var/lib/grafana/grafana.db）
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - influx

  influx:
    image: influxdb:1.12
    restart: unless-stopped
    environment:
      - INFLUXDB_DB=${INFLUX_DB:-health}
    volumes:
      - influx-data:/var/lib/influxdb

  # 一次性 zip 导入（按需手动运行）：
  #   docker compose run --rm -v /path/to/export.zip:/export.zip ingester
  ingester:
    build: ./ingester
    profiles: ["import"]
    depends_on:
      - influx

  api:
    build: ./ingester
    restart: unless-stopped
    command: ["api.py"]
    ports:
      - "${API_PORT:-5353}:${API_PORT:-5353}"
    environment:
      - INFLUX_HOST=influx
      - INFLUX_DB=${INFLUX_DB:-health}
      - API_PORT=${API_PORT:-5353}
      - API_KEY=${API_KEY:-}
    depends_on:
      - influx

volumes:
  influx-data:
  grafana-data:
